name: 'MCReleaser'
description: 'Github Action to publish artifacts to multiple platforms of voxel games'
inputs:
  files:
    description: 'The files to upload'
    required: true
  platforms:
    description: 'The platforms to upload to'
    required: false
    default: 'all'
runs:
  using: 'docker'
  image: 'docker://ghcr.io/hsgamer/mcreleaser:master'
  env:
    FILES: ${{ inputs.files }}
    PLATFORMS: ${{ inputs.platforms }}
